# CI for sz-cpp-sdk: build the C++ SDK and run the real-engine GoogleTest suite.
#
# The tests run against the REAL native Senzing engine (no mocks), so the job
# provisions a Senzing runtime at the canonical /opt/senzing paths.
#
# Version: the production apt repo's current 4.x line (4.3.2). The SDK's public
# surface mirrors the C# 4.3.0 API; the public API is byte-for-byte identical
# between 4.3.2 and 4.4.0 (verified by diffing the installed 4.4.0 Senzing.Sdk
# package against the 4.3.0 source -- only two additive flag-metadata types,
# SzFlagInfo / SzFlagUsageGroupInfo, differ; no interface/method/exception
# changes). The SDK was verified to build AND pass all tests against a real
# 4.3.2 install, so CI tracks the stable production line rather than the
# staging-only 4.4.x. Bump SENZING_VERSION when a newer build promotes to
# production (flags/error tables regenerate from the installed JSON at configure
# time, so no source change is needed for a version bump).
#
# Install method & sources (verified via the Senzing MCP sdk_guide
# topic=install, platform=linux_apt; package ownership confirmed via dpkg -S on a
# real install):
#   * Repo bootstrap: the `senzingrepo` package (senzingrepo_2.0.1-1_all.deb from
#     senzing-production-apt.s3.amazonaws.com) -- the OS-detecting apt configurer.
#   * senzingsdk-runtime -> libSz.so, native C headers (/opt/senzing/er/sdk/c),
#     szflags.json + szerrors.json (codegen inputs), /etc/opt/senzing config,
#     /opt/senzing/data support files, and the rules/resources tree.
#   * senzingsdk-setup    -> the SQLite schema SQL
#     (/opt/senzing/er/resources/schema/szcore-schema-sqlite-create.sql) that the
#     test fixture applies to build a fresh repo per test. (The prebuilt G2C.db
#     template lives only in the optional senzingsdk-poc package; the fixture
#     deliberately creates the schema instead so CI needs only runtime + setup.)
#   * sqlite3 CLI -> used by the fixture to apply the schema.
#
# EULA: installing Senzing requires accepting the Senzing EULA
# (https://senzing.com/senzing-eula). CI asserts acceptance via the documented
# SENZING_ACCEPT_EULA env var; running this workflow constitutes that acceptance.

name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    name: Build & real-engine tests (Senzing 4.3.x)
    runs-on: ubuntu-latest

    env:
      SENZING_VERSION: "4.3.2"
      SENZING_ACCEPT_EULA: "I_ACCEPT_THE_SENZING_EULA"
      SENZING_REPO_DEB: "senzingrepo_2.0.1-1_all.deb"
      SENZING_REPO_URL: "https://senzing-production-apt.s3.amazonaws.com"
      DEBIAN_FRONTEND: noninteractive
      LD_LIBRARY_PATH: /opt/senzing/er/lib

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build g++ python3 git ca-certificates wget sqlite3

      - name: Configure Senzing apt repository
        run: |
          wget -q "${SENZING_REPO_URL}/${SENZING_REPO_DEB}"
          sudo apt-get install -y "./${SENZING_REPO_DEB}"
          sudo apt-get update

      - name: Install Senzing runtime + setup (libSz, headers, config, schema SQL)
        run: |
          # `sudo` resets the environment, so SENZING_ACCEPT_EULA must be passed
          # explicitly through to the package postinst -- otherwise it blocks
          # waiting for EULA acceptance and the job hangs. Pass DEBIAN_FRONTEND
          # too so debconf never prompts.
          sudo SENZING_ACCEPT_EULA="${SENZING_ACCEPT_EULA}" \
               DEBIAN_FRONTEND=noninteractive \
               apt-get install -y --no-install-recommends \
            "senzingsdk-runtime=${SENZING_VERSION}-*" \
            "senzingsdk-setup=${SENZING_VERSION}-*"
          # Fail loudly now if any path the build/tests depend on is missing.
          test -f /opt/senzing/er/lib/libSz.so
          test -d /opt/senzing/er/sdk/c
          test -f /opt/senzing/er/sdk/szflags.json
          test -f /opt/senzing/er/sdk/szerrors.json
          test -d /etc/opt/senzing
          test -d /opt/senzing/data
          test -f /opt/senzing/er/resources/schema/szcore-schema-sqlite-create.sql

      - name: Configure (CMake + Ninja, C++20, Debug)
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build

      - name: Test (real engine; CTest applies the ASan/LD_PRELOAD wiring)
        run: ctest --test-dir build --output-on-failure
